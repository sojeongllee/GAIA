<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAIA — 호스트 패널</title>
  <link rel="stylesheet" href="/css/host.css">
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="logo">GAIA</span>
  <span class="status-badge" id="active-badge">대기 중</span>
  <div id="participant-count-badge">
    👤 연결된 참가자: <span id="participant-count">0</span>명
  </div>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" onclick="exportResponsesCSV()">⬇️ 응답 CSV</button>
    <button class="btn btn-ghost btn-sm" onclick="exportResponsesJSON()">⬇️ 응답 JSON</button>
    <button class="btn btn-ghost btn-sm" onclick="exportEventsJSON()">⬇️ 이벤트 로그 JSON</button>
  </div>
</div>

<!-- Active state info bar -->
<div id="active-info"></div>

<!-- Four-column layout -->
<div id="main">

  <!-- Col 1: Scenario list -->
  <div class="col" id="col-scenarios">
    <div class="col-header">📋 시나리오</div>
    <div class="col-body" id="scenario-list"></div>
  </div>

  <!-- Col 2: Options + action bar -->
  <div class="col" id="col-options">
    <div class="col-header">🎛️ UI 옵션</div>
    <div class="col-body" id="option-list">
      <p class="option-placeholder">← 시나리오를 선택하세요</p>
    </div>
    <div id="action-bar">
      <button class="btn btn-primary" id="btn-show" disabled onclick="showToParticipant()">
        ▶ 참가자에게 보이기
      </button>
      <button class="btn btn-danger" onclick="resetParticipant()">↺ 초기화</button>
    </div>
  </div>

  <!-- Col 3: Live participant view -->
  <div class="col" id="col-liveview">
    <div class="col-header">📺 참가자 화면 (실시간)</div>
    <div id="live-view-frame">
      <div id="live-view-waiting">
        <div class="lv-icon">⏳</div>
        <div class="lv-text">참가자에게 보이기를 누르면<br>여기서 실시간으로 볼 수 있어요</div>
      </div>
      <div id="live-view-content"></div>
    </div>
  </div>

  <!-- Col 4: Notes + response log -->
  <div class="col" id="col-right">

    <div id="notes-section">
      <div class="col-header" style="border-bottom:none;">
        📝 메모 <span id="notes-context"></span>
      </div>
      <div id="notes-body">
        <textarea id="notes-textarea"
          placeholder="시나리오 또는 UI 옵션을 선택하면 메모할 수 있어요."
          oninput="onNoteInput()"
          disabled></textarea>
      </div>
    </div>

    <div id="log-section">
      <div class="col-header" style="border-top:1px solid var(--border)">📊 응답 로그</div>
      <div class="col-body" id="log-body">
        <input type="text" id="log-filter" placeholder="참가자 ID로 필터 (예: P1)"
               oninput="filterLog()">
        <div id="log-entries">
          <p class="log-empty">아직 응답이 없습니다.</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Preview modal (option card 미리보기 전용) -->
<div id="preview-modal" onclick="closePreview(event)">
  <div class="preview-container">
    <div class="preview-header">
      <div>
        <span class="preview-type-badge" id="preview-type-badge"></span>
        <strong id="preview-title"></strong>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closePreviewBtn()">✕ 닫기</button>
    </div>
    <div class="preview-game-frame">
      <div class="preview-pid-badge">미리보기</div>
      <div id="preview-ui-content"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/host.js"></script>
</body>
</html>
