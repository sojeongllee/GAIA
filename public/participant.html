<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAIA — 참가자 화면</title>
  <link rel="stylesheet" href="/css/participant.css">
</head>
<body>
<div id="game-screen">

  <label id="bg-upload-label" title="게임 스크린샷을 배경으로 설정">
    🖼️
    <input type="file" id="bg-upload" accept="image/*" onchange="setBgImage(this)">
  </label>

  <div id="pid-badge">참가자: <strong id="pid-label">-</strong></div>

  <div id="tts-controls" hidden aria-label="음성 안내 제어">
    <button type="button" class="tts-control-btn"
            onclick="replayCurrentTts()" aria-label="현재 UI 음성 안내 다시 듣기">
      🔊 <span>다시 듣기</span>
    </button>
    <button type="button" class="tts-control-btn tts-stop-btn"
            onclick="stopTts(true)" aria-label="음성 안내 멈추기">
      ■ <span>멈춤</span>
    </button>
    <span id="tts-control-status">음성 안내 준비됨</span>
  </div>

  <div id="waiting-screen">
    <div class="w-icon">⏳</div>
    <div class="w-title">대기 중...</div>
    <div class="w-sub">호스트가 UI를 선택하면 화면이 업데이트됩니다.</div>
  </div>

  <!-- 연구 질문 입력은 호스트 패널에서 진행합니다. -->
  <div id="ui-overlay"></div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/participant.js"></script>
<script src="/js/tts.js"></script>
</body>
</html>
